<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#161616">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GSD">
  <meta name="description" content="Mobile companion for GSD — manage agent sessions on the go">
  <title>GSD Mobile</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<div id="app">

  <!-- ═══════ Connect View ═══════ -->
  <div id="view-connect" class="view connect-view active">
    <div class="connect-logo">
      <svg viewBox="0 0 1471 636" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect y="115" width="115" height="370" fill="currentColor"/>
        <rect x="58" y="600" width="115" height="324" transform="rotate(-90 58 600)" fill="currentColor"/>
        <rect x="58" y="115" width="115" height="324" transform="rotate(-90 58 115)" fill="currentColor"/>
        <rect x="624" y="115" width="115" height="290" transform="rotate(-90 624 115)" fill="currentColor"/>
        <rect x="547" y="360" width="115" height="367" transform="rotate(-90 547 360)" fill="currentColor"/>
        <rect x="547" y="600" width="115" height="290" transform="rotate(-90 547 600)" fill="currentColor"/>
        <rect x="1053" y="600" width="115" height="324" transform="rotate(-90 1053 600)" fill="currentColor"/>
        <rect x="1053" y="116" width="115" height="324" transform="rotate(-90 1053 116)" fill="currentColor"/>
        <rect x="662" y="331" width="115" height="331" transform="rotate(180 662 331)" fill="currentColor"/>
        <rect x="1130" y="600" width="115" height="600" transform="rotate(180 1130 600)" fill="currentColor"/>
        <rect x="1435" y="485" width="115" height="369" transform="rotate(180 1435 485)" fill="currentColor"/>
        <rect x="914" y="600" width="115" height="355" transform="rotate(180 914 600)" fill="currentColor"/>
        <rect x="310" y="485" width="115" height="123" transform="rotate(-90 310 485)" fill="currentColor"/>
        <rect x="216" y="370" width="115" height="217" transform="rotate(-90 216 370)" fill="currentColor"/>
        <rect x="36" y="151" width="115" height="370" fill="currentColor" fill-opacity="0.4"/>
        <rect x="94" y="636" width="115" height="324" transform="rotate(-90 94 636)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="94" y="151" width="115" height="324" transform="rotate(-90 94 151)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="698" y="151" width="115" height="252" transform="rotate(-90 698 151)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="583" y="396" width="115" height="331" transform="rotate(-90 583 396)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="583" y="636" width="115" height="252" transform="rotate(-90 583 636)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="1166" y="636" width="115" height="247" transform="rotate(-90 1166 636)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="1166" y="151" width="115" height="247" transform="rotate(-90 1166 151)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="698" y="360" width="115" height="324" transform="rotate(180 698 360)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="1166" y="636" width="115" height="600" transform="rotate(180 1166 636)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="1471" y="521" width="115" height="369" transform="rotate(180 1471 521)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="950" y="636" width="115" height="355" transform="rotate(180 950 636)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="346" y="521" width="115" height="123" transform="rotate(-90 346 521)" fill="currentColor" fill-opacity="0.4"/>
        <rect x="252" y="406" width="115" height="217" transform="rotate(-90 252 406)" fill="currentColor" fill-opacity="0.4"/>
      </svg>
    </div>

    <h1 class="connect-title">GSD Mobile</h1>
    <p class="connect-subtitle">Connect to your self-hosted server</p>

    <!-- Saved connection (shown when token exists) -->
    <div class="connect-saved">
      <div class="connect-saved-label">Saved Connection</div>
      <div class="connect-saved-item">
        <div>
          <div class="connect-saved-name">Device</div>
          <div class="connect-saved-url">ws://...</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="reconnectSaved()">Reconnect</button>
          <button class="btn btn-ghost btn-sm" onclick="forgetSaved()">Forget</button>
        </div>
      </div>
    </div>

    <div id="connect-error" class="connect-error"></div>

    <form id="connect-form" class="connect-form">
      <div class="form-group">
        <label class="form-label" for="server-url">Server URL</label>
        <input class="form-input" type="text" id="server-url"
               placeholder="192.168.1.100:3001" autocomplete="url"
               inputmode="url" autocapitalize="none">
      </div>
      <div class="form-group">
        <label class="form-label" for="pairing-code">Pairing Code</label>
        <input class="form-input form-input-code" type="text" id="pairing-code"
               placeholder="000 000" maxlength="7" autocomplete="one-time-code"
               inputmode="numeric" pattern="[0-9\s-]*">
      </div>
      <button type="submit" id="connect-btn" class="btn btn-primary btn-full">Connect</button>
    </form>
  </div>

  <!-- ═══════ Sessions View ═══════ -->
  <div id="view-sessions" class="view">
    <div class="session-list-header">
      <span class="session-list-title">Sessions</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-primary" onclick="requestNewSession()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New
        </button>
        <button class="btn btn-sm btn-ghost" onclick="disconnect()" style="color:var(--danger)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div id="session-list" class="session-list">
      <div class="loading-state">
        <div class="spinner"></div>
        Loading sessions...
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="tab-bar">
      <button class="tab-item active" data-view="sessions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Sessions
      </button>
      <button class="tab-item" data-view="session">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Active
      </button>
    </div>
  </div>

  <!-- ═══════ Session (Chat) View ═══════ -->
  <div id="view-session" class="view">
    <div class="session-header">
      <div class="session-header-left">
        <button class="session-back" onclick="detachSession()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="session-title">Session</span>
      </div>
      <div id="session-status" class="session-status waiting">
        <span class="status-pulse"></span> waiting
      </div>
    </div>

    <div id="messages" class="session-messages">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <p>Send a message to get started</p>
      </div>
    </div>

    <form id="prompt-form" class="session-input">
      <div class="input-actions">
        <button type="button" class="input-action-btn" onclick="sendAbort()" title="Abort">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
      </div>
      <textarea id="prompt-input" class="input-textarea" rows="1"
                placeholder="Message your agent..." autocomplete="off"></textarea>
      <button type="submit" class="input-send" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </div>

  <!-- ═══════ Extension UI Dialog ═══════ -->
  <div id="dialog-overlay" class="dialog-overlay">
    <div class="dialog-sheet">
      <div class="dialog-handle"></div>
      <h2 id="dialog-title" class="dialog-title"></h2>
      <p id="dialog-message" class="dialog-message"></p>
      <div id="dialog-options" class="dialog-options"></div>
      <div id="dialog-input" class="dialog-input"></div>
      <div class="dialog-actions">
        <button class="dialog-btn dialog-btn-cancel" onclick="cancelDialog()">Cancel</button>
        <button class="dialog-btn dialog-btn-primary" onclick="submitDialogInput()">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ═══════ Toast ═══════ -->
  <div id="toast" class="toast"></div>

</div>
<script src="/app.js"></script>
</body>
</html>
